<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="background">
        <div id="container">
            <h1>Password Generator</h1>
            <div id="password-container">
                <button id="copy-password">Copy</button>
                <input type="text" id="password"  disabled>
                
            </div>
            <div id="options">
                <div id="option">
                    <div class="option">
                        <label for="length">Length</label>
                        <input type="number" id="length" value="12" min="8" max="100">
                    </div>
                    <div class="option">
                        <label for="include-uppercase">Include Uppercase</label>
                        <input type="checkbox" id="include-uppercase" checked>
                    </div>
                    <div class="option">
                        <label for="include-lowercase">Include Lowercase</label>
                        <input type="checkbox" id="include-lowercase" checked>
                    </div>
                    <div class="option">
                        <label for="include-numbers">Include Numbers</label>
                        <input type="checkbox" id="include-numbers" checked>
                    </div>
                    <div class="option">
                        <label for="include-symbols">Include Symbols</label>
                        <input type="checkbox" id="include-symbols" checked>
                    </div>
                    <div class="option">
                        <button id="generate-password">Generate Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
